<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}E-Shelle Artisans{% endblock %}</title>
  <style>
    :root{--green:#16a34a;--deep:#052e1b;--orange:#f97316;--ink:#0f172a;--muted:#64748b;--line:#dbe7df;--soft:#f8fbf8}
    *{box-sizing:border-box} body{margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,sans-serif;color:var(--ink);background:#fff} a{text-decoration:none;color:inherit}
    .wrap{width:min(1180px,calc(100% - 32px));margin:0 auto}.top{position:sticky;top:0;z-index:10;background:rgba(255,255,255,.94);border-bottom:1px solid var(--line);backdrop-filter:blur(16px)}
    .nav{min-height:68px;display:flex;align-items:center;justify-content:space-between;gap:14px}.brand{display:flex;gap:10px;align-items:center;font-weight:950}.brand-mark{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,var(--green),var(--deep));color:#fff;display:grid;place-items:center}
    .links{display:flex;gap:8px;flex-wrap:wrap}.links a,.btn{display:inline-flex;align-items:center;justify-content:center;min-height:40px;padding:0 14px;border-radius:8px;font-weight:850;border:1px solid transparent}.links a:hover{background:#ecfdf5;color:var(--deep)}
    .btn-primary{background:linear-gradient(135deg,var(--green),var(--deep));color:#fff;box-shadow:0 12px 28px rgba(22,163,74,.2)}.btn-outline{border-color:#bbf7d0;color:var(--deep);background:#fff}.btn-ghost{background:#ecfdf5;color:var(--deep)}
    .hero{padding:52px 0 34px;background:radial-gradient(circle at 18% 10%,rgba(22,163,74,.18),transparent 30%),linear-gradient(135deg,#f0fdf4,#fff 55%,#fff7ed);border-bottom:1px solid var(--line)}
    .hero-grid{display:grid;grid-template-columns:1.05fr .95fr;gap:28px;align-items:center}.eyebrow{display:inline-flex;gap:8px;align-items:center;background:#ecfdf5;border:1px solid #bbf7d0;color:var(--deep);border-radius:999px;padding:8px 12px;font-weight:950;font-size:13px}
    h1{font-size:clamp(2.2rem,5vw,4.4rem);line-height:.98;margin:18px 0 12px;letter-spacing:-.04em} h2{font-size:clamp(1.6rem,3vw,2.4rem);margin:0 0 10px} h3{margin:0 0 8px} p{color:var(--muted);line-height:1.65}
    .panel{background:#fff;border:1px solid var(--line);border-radius:8px;box-shadow:0 20px 55px rgba(6,95,70,.1)}.search{padding:18px;display:grid;grid-template-columns:1.3fr 1fr 1fr auto;gap:10px;align-items:end}
    .artisan-input{width:100%;min-height:42px;border:1px solid #cbd5e1;border-radius:8px;padding:10px 12px;font:inherit;background:#fff}.artisan-check{width:auto}.field label{display:block;font-weight:850;font-size:13px;margin-bottom:6px;color:#334155}
    .section{padding:42px 0}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}.stat{padding:18px}.stat strong{display:block;font-size:2rem;color:var(--deep)}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:16px}.card{position:relative;overflow:hidden;padding:16px;border-radius:8px;border:1px solid var(--line);background:#fff;display:flex;flex-direction:column;gap:12px;min-height:255px;transition:.2s}.card:before{content:"";position:absolute;inset:0 0 auto;height:3px;background:linear-gradient(90deg,var(--green),var(--orange))}.card:hover{transform:translateY(-4px);box-shadow:0 18px 45px rgba(22,163,74,.16)}
    .avatar{width:74px;height:74px;border-radius:16px;object-fit:cover;background:#ecfdf5;display:grid;place-items:center;color:var(--deep);font-weight:950;font-size:1.6rem}.meta{display:flex;gap:7px;flex-wrap:wrap;color:#475569;font-size:13px}.pill{display:inline-flex;align-items:center;padding:5px 9px;border-radius:999px;background:#ecfdf5;border:1px solid #bbf7d0;color:var(--deep);font-size:12px;font-weight:850}.empty{padding:24px;text-align:center;border:1px dashed #bbf7d0;border-radius:8px;background:#ecfdf5;color:var(--deep);font-weight:800}
    .detail-grid{display:grid;grid-template-columns:minmax(0,1fr) 340px;gap:22px;align-items:start}.gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}.gallery img{width:100%;aspect-ratio:4/3;object-fit:cover;border-radius:8px;border:1px solid var(--line)}
    @media(max-width:850px){.hero-grid,.search,.stats,.detail-grid{grid-template-columns:1fr}.nav{align-items:flex-start;padding:12px 0}}
  </style>
</head>
<body>
  <header class="top"><div class="wrap nav"><a class="brand" href="{% url 'artisans:accueil' %}"><span class="brand-mark">✦</span><span>E-Shelle Artisans</span></a><nav class="links"><a href="{% url 'artisans:accueil' %}">Trouver</a><a href="{% url 'artisans:demande_travaux' %}">Demande travaux</a><a href="{% url 'artisans:espace_artisan' %}">Espace pro</a><a href="/" class="btn btn-outline">E-Shelle</a></nav></div></header>
  {% if messages %}<div class="wrap" style="margin-top:14px">{% for message in messages %}<div class="panel" style="padding:12px;color:var(--deep);font-weight:850">{{ message }}</div>{% endfor %}</div>{% endif %}
  <main>{% block content %}{% endblock %}</main>
</body>
</html>
