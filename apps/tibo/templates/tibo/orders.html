{% extends "tibo/base.html" %}
{% block title %}Commandes TIBO{% endblock %}
{% block content %}
<section class="tibo-page">
  <h1>Mes commandes</h1>
  <div class="space-y-4 mt-8">
    {% for order in orders %}
      <article class="tibo-line"><strong>{{ order.number }}</strong><span>{{ order.status }}</span><span>{{ order.total }} {{ order.currency }}</span></article>
    {% empty %}<p class="text-slate-400">Aucune commande pour le moment.</p>{% endfor %}
  </div>
</section>
{% endblock %}
