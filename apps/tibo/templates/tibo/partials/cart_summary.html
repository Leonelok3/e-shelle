<section class="tibo-panel sticky top-24">
  <h2 class="text-xl font-semibold">Résumé</h2>
  <dl class="mt-5 space-y-3 text-sm">
    <div class="flex justify-between"><dt>Sous-total</dt><dd>{{ cart.subtotal }} {{ cart.currency }}</dd></div>
    <div class="flex justify-between"><dt>Rabais</dt><dd>-{{ cart.discount_total }} {{ cart.currency }}</dd></div>
    <div class="flex justify-between"><dt>Taxes estimées</dt><dd>{{ cart.tax_total }} {{ cart.currency }}</dd></div>
    <div class="flex justify-between"><dt>Livraison</dt><dd>{{ cart.shipping_total }} {{ cart.currency }}</dd></div>
    <div class="flex justify-between border-t border-white/10 pt-4 text-lg font-semibold"><dt>Total</dt><dd>{{ cart.total }} {{ cart.currency }}</dd></div>
  </dl>
  <a class="tibo-btn mt-6 w-full" href="{% url 'tibo:checkout' %}">Checkout sécurisé</a>
</section>
