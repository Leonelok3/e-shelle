{% extends "tibo/base.html" %}
{% block title %}Checkout TIBO{% endblock %}
{% block content %}
<section class="tibo-page">
  <h1>Checkout sécurisé</h1>
  <div class="tibo-checkout-grid">
    <form method="post" class="tibo-panel tibo-form">
      {% csrf_token %}
      {{ form.as_p }}
      <button class="tibo-btn w-full">Payer maintenant</button>
    </form>
    {% include "tibo/partials/cart_summary.html" %}
  </div>
</section>
{% endblock %}
