{% if request.path != "/chat/" %}
<div id="chat-float" class="es-chat-float">
  <a href="{% url 'chat:home' %}" class="es-chat-float__link" aria-label="Ouvrir E-Shelle AI">
    <span class="es-chat-float__icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/>
      </svg>
      <span class="es-chat-float__ping"></span>
    </span>
    <span>E-Shelle AI</span>
  </a>
</div>

<style>
.es-chat-float {
  position: fixed;
  right: 1.5rem;
  bottom: 5.75rem;
  z-index: 1050;
}
.es-chat-float__link {
  display: inline-flex;
  align-items: center;
  gap: .55rem;
  padding: .85rem 1rem;
  border-radius: 16px;
  color: #fff;
  text-decoration: none;
  font-size: .9rem;
  font-weight: 700;
  background: linear-gradient(135deg, #22c55e, #16a34a);
  box-shadow: 0 16px 36px rgba(0,0,0,.35), 0 8px 24px rgba(34,197,94,.24);
  transition: transform .18s ease, box-shadow .18s ease;
}
.es-chat-float__link:hover {
  color: #fff;
  transform: translateY(-2px);
  box-shadow: 0 20px 44px rgba(0,0,0,.42), 0 10px 30px rgba(34,197,94,.32);
}
.es-chat-float__icon {
  position: relative;
  display: inline-flex;
}
.es-chat-float__ping {
  position: absolute;
  top: -4px;
  right: -5px;
  width: 8px;
  height: 8px;
  border-radius: 999px;
  background: #facc15;
  box-shadow: 0 0 0 4px rgba(250,204,21,.18);
}
@media (max-width: 640px) {
  .es-chat-float { right: 1rem; bottom: 5rem; }
  .es-chat-float__link span:last-child { display: none; }
  .es-chat-float__link { width: 52px; height: 52px; justify-content: center; padding: 0; border-radius: 18px; }
}
</style>
{% endif %}
