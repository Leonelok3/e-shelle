{% load static %}
<link rel="stylesheet" href="{% static 'job_agent/job_agent.css' %}?v=2">
<style>
/* Job Agent — Critical gold overrides (inline, beats cache) */
body.job-agent{background:#050A18!important}
body.job-agent .app-main.job-agent{background:transparent}
body.job-agent .app-main.job-agent .c-btn,
body.job-agent .app-main.job-agent a.c-btn,
body.job-agent .app-main.job-agent button.c-btn{
  background:rgba(212,168,67,0.07)!important;
  border:1px solid rgba(212,168,67,0.28)!important;
  color:rgba(232,234,240,0.85)!important;
  border-radius:10px!important;font-weight:600!important;
}
body.job-agent .app-main.job-agent .c-btn:hover,
body.job-agent .app-main.job-agent a.c-btn:hover,
body.job-agent .app-main.job-agent button.c-btn:hover{
  background:rgba(212,168,67,0.14)!important;
  border-color:rgba(212,168,67,0.5)!important;
  color:#F0C060!important;transform:translateY(-1px)!important;
}
body.job-agent .app-main.job-agent .c-btn--primary,
body.job-agent .app-main.job-agent a.c-btn--primary,
body.job-agent .app-main.job-agent button.c-btn--primary{
  background:linear-gradient(135deg,#D4A843,#F0C060)!important;
  color:#050A18!important;border-color:transparent!important;
  box-shadow:0 4px 16px rgba(212,168,67,0.35)!important;font-weight:700!important;
}
body.job-agent .app-main.job-agent .c-btn--primary:hover,
body.job-agent .app-main.job-agent a.c-btn--primary:hover,
body.job-agent .app-main.job-agent button.c-btn--primary:hover{
  box-shadow:0 6px 24px rgba(212,168,67,0.5)!important;
  color:#050A18!important;transform:translateY(-2px)!important;
}
body.job-agent .app-main.job-agent .ja-pagehead__title h1{
  font-family:'Cormorant Garamond',Georgia,serif;
  color:#F0C060;letter-spacing:.02em;
}
body.job-agent .app-main.job-agent .ja-card{
  background:rgba(10,22,40,0.75)!important;
  border:1px solid rgba(212,168,67,0.20)!important;
  backdrop-filter:blur(16px);
}
body.job-agent .app-main.job-agent .ja-card__head h2,
body.job-agent .app-main.job-agent .ja-card__head h3{
  color:#D4A843!important;font-size:11px!important;
  text-transform:uppercase;letter-spacing:.1em;font-weight:700!important;
}
body.job-agent .app-main.job-agent .ja-stat{
  background:linear-gradient(135deg,rgba(212,168,67,0.08),rgba(5,10,24,0.85))!important;
  border:1px solid rgba(212,168,67,0.22)!important;
  border-left:3px solid #D4A843!important;
}
body.job-agent .app-main.job-agent .ja-stat__v{
  color:#F0C060!important;
  font-family:'Bebas Neue',sans-serif;letter-spacing:.04em;
}
body.job-agent .app-main.job-agent .ja-stat__k{color:rgba(212,168,67,0.7)!important;}
body.job-agent .app-main.job-agent .ja-kanban__col{
  background:rgba(10,22,40,0.7)!important;
  border:1px solid rgba(212,168,67,0.18)!important;
}
body.job-agent .app-main.job-agent .ja-kanban__colhead strong{color:#D4A843!important;}
body.job-agent .app-main.job-agent .ja-kanban__count{
  background:rgba(212,168,67,0.1)!important;
  border-color:rgba(212,168,67,0.25)!important;
  color:#F0C060!important;
}
body.job-agent .app-main.job-agent .ja-leadcard{
  background:linear-gradient(180deg,rgba(15,32,64,0.75),rgba(5,10,24,0.9))!important;
  border:1px solid rgba(212,168,67,0.18)!important;
}
body.job-agent .app-main.job-agent .ja-empty{
  background:rgba(212,168,67,0.04)!important;
  border:1px dashed rgba(212,168,67,0.22)!important;
}
body.job-agent .app-main.job-agent .ja-empty__icon{
  background:rgba(212,168,67,0.1)!important;
  border-color:rgba(212,168,67,0.25)!important;
}
body.job-agent .app-main.job-agent .ja-empty__glyph{color:#D4A843!important;}
body.job-agent .app-main.job-agent .ja-toast{
  background:rgba(5,10,24,0.9)!important;
  border:1px solid rgba(212,168,67,0.3)!important;
}
body.job-agent .app-main.job-agent .c-input,
body.job-agent .app-main.job-agent select,
body.job-agent .app-main.job-agent textarea,
body.job-agent .app-main.job-agent input[type="text"],
body.job-agent .app-main.job-agent input[type="url"],
body.job-agent .app-main.job-agent input[type="email"]{
  background:rgba(5,10,24,0.7)!important;
  border:1px solid rgba(212,168,67,0.25)!important;
  color:rgba(232,234,240,0.9)!important;border-radius:10px!important;
}
body.job-agent .app-main.job-agent input:focus,
body.job-agent .app-main.job-agent select:focus,
body.job-agent .app-main.job-agent textarea:focus{
  border-color:#D4A843!important;
  box-shadow:0 0 0 3px rgba(212,168,67,0.12)!important;
}
body.job-agent .app-main.job-agent select option{background:#0A1628!important}
</style>
