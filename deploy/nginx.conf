# ==========================================
# SERVEURS SECURES HTTPS (Port 443)
# ==========================================

# 1. Serveur principal HTTPS (e-shelle.com & www.e-shelle.com)
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name e-shelle.com www.e-shelle.com;

    # --- Certificats SSL ---
    ssl_certificate     /etc/letsencrypt/live/e-shelle.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/e-shelle.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # --- Sécurité ---
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    client_max_body_size 55M;

    access_log /var/log/nginx/eshelle_access.log;
    error_log  /var/log/nginx/eshelle_error.log;

    # --- Fichiers statiques ---
    location /static/ {
        alias /var/www/e-shelle/staticfiles/;
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # --- Fichiers média ---
    location /media/ {
        alias /var/www/e-shelle/media/;
        expires 7d;
        access_log off;
    }

    # --- Certbot challenge ---
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        allow all;
    }

    # --- Streaming SSE (générateur IA) ---
    location /ia/stream/ {
        proxy_pass         http://eshelle_gunicorn;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 300s;
        chunked_transfer_encoding on;
    }

    # --- Application Django via Gunicorn ---
    location / {
        proxy_pass         http://eshelle_gunicorn;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_redirect     off;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # --- Bloquer les fichiers sensibles ---
    location ~ /\.(?!well-known) {
        deny all;
    }
    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }
}

