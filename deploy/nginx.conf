##############################################################################
# Nginx — E-Shelle (Production Config)
# Fichier à placer : /etc/nginx/sites-available/eshelle
##############################################################################

upstream eshelle_gunicorn {
    server 127.0.0.1:8000;
}

upstream simplo_gunicorn {
    server unix:/run/simplo/gunicorn.sock fail_timeout=0;
}

# ==========================================
# REDIRECTIONS HTTP → HTTPS (Port 80)
# ==========================================

# 1. Domaine principal et www
server {
    listen 80;
    listen [::]:80;
    server_name e-shelle.com www.e-shelle.com;

    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

