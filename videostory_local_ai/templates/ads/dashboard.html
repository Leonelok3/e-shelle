{% extends 'base.html' %}
{% block content %}
<h2>Dashboard - Projets publicitaires</h2>
<p><a href="{% url 'ads:create_ad' %}">Créer une nouvelle publicité</a></p>
<ul>
  {% for p in projects %}
    <li><a href="{% url 'ads:project_detail' p.pk %}">{{ p }}</a> - {{ p.status }}</li>
  {% empty %}
    <li>Aucun projet</li>
  {% endfor %}
</ul>
{% endblock %}
