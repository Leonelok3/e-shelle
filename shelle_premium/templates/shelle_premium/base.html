{% load static %}
<!doctype html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Shelle Premium{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        /* Variables du design system Shelle Premium */
        :root {
            --bg-primary: #0a0a0f;
            --bg-card: #12121a;
            --or-principal: #c9a84c;
            --or-clair: #e8c97a;
            --texte-principal: #f0ece0;
            --texte-secondaire: #8a8070;
            --bordure: rgba(201, 168, 76, 0.2);
            --ombre-or: 0 8px 32px rgba(201, 168, 76, 0.15);
            --danger: #ef5b5b;
            --success: #48c774;
            --surface-soft: rgba(255, 255, 255, 0.04);
            --surface-strong: rgba(255, 255, 255, 0.08);
        }

        /* Reset simple pour une base autonome */
        * {
            box-sizing: border-box;
        }

        html {
            min-height: 100%;
            background: var(--bg-primary);
        }

        body {
            min-height: 100vh;
            margin: 0;
            color: var(--texte-principal);
            font-family: "DM Sans", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background:
                radial-gradient(circle at 20% 10%, rgba(201, 168, 76, 0.13), transparent 32rem),
                radial-gradient(circle at 85% 90%, rgba(232, 201, 122, 0.08), transparent 30rem),
                var(--bg-primary);
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        button,
        input,
        textarea {
            font: inherit;
        }

        .shelle-shell {
            width: min(1180px, calc(100% - 32px));
            margin: 0 auto;
            padding: 32px 0;
        }

        .brand-line {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 28px;
        }

        .brand-mark {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            min-width: 0;
        }

        .brand-symbol {
            display: grid;
            width: 38px;
            height: 38px;
            place-items: center;
            border: 1px solid var(--bordure);
            border-radius: 50%;
            color: var(--or-clair);
            background: linear-gradient(145deg, rgba(201, 168, 76, 0.18), rgba(255, 255, 255, 0.03));
            box-shadow: var(--ombre-or);
            font-weight: 700;
        }

        .brand-name {
            min-width: 0;
        }

        .brand-name strong {
            display: block;
            font-family: "Playfair Display", Georgia, serif;
            font-size: clamp(1.25rem, 3vw, 1.8rem);
            line-height: 1;
        }

        .brand-name span {
            display: block;
            margin-top: 4px;
            color: var(--texte-secondaire);
            font-size: 0.9rem;
        }

        .page-title {
            margin: 0;
            font-family: "Playfair Display", Georgia, serif;
            font-size: clamp(2rem, 5vw, 4.2rem);
            line-height: 0.95;
            letter-spacing: 0;
        }

        .page-kicker {
            margin: 0 0 10px;
            color: var(--or-clair);
            font-size: 0.76rem;
            font-weight: 500;
            letter-spacing: 0.14em;
            text-transform: uppercase;
        }

        .page-copy {
            max-width: 620px;
            margin: 16px 0 0;
            color: var(--texte-secondaire);
            font-size: 1rem;
            line-height: 1.65;
        }

        .gold-card {
            border: 1px solid var(--bordure);
            border-radius: 8px;
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.045), rgba(255, 255, 255, 0.015)),
                var(--bg-card);
            box-shadow: var(--ombre-or);
        }

        .fade-up {
            animation: fadeUp 680ms ease both;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(18px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 720px) {
            .shelle-shell {
                width: min(100% - 20px, 1180px);
                padding: 22px 0;
            }

            .brand-line {
                align-items: flex-start;
                flex-direction: column;
                margin-bottom: 22px;
            }
        }

        {% block extra_css %}{% endblock %}
    </style>
</head>
<body class="{% block body_class %}{% endblock %}">
    <main class="shelle-shell">
        <header class="brand-line" aria-label="Identite Shelle Premium">
            <a class="brand-mark" href="{% url 'shelle_premium:formulaire' %}">
                <span class="brand-symbol">S</span>
                <span class="brand-name">
                    <strong>Shelle Premium</strong>
                    <span>Gestion des cartes prestataires</span>
                </span>
            </a>
            {% block header_action %}{% endblock %}
        </header>

        {% block content %}{% endblock %}
    </main>

    {% block scripts %}{% endblock %}
</body>
</html>
