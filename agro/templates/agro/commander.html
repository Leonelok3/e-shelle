{% extends 'agro/base_agro.html' %}

{% block content %}
<div class="container-xl py-4">
  <div class="row justify-content-center">
    <div class="col-lg-7">
      <div class="agro-form-card">
        <h1 class="h3 fw-bold">Commander {{ produit.nom }}</h1>
        <p class="text-muted">Le vendeur recevra une demande de devis. Paiement MTN MoMo, Orange Money et paiement à la livraison sont prévus pour l'intégration.</p>
        <form method="post">
          {% csrf_token %}
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">Quantité</label>
              <input type="number" step="0.01" min="{{ produit.quantite_min_commande }}" name="quantite" class="form-control" value="{{ produit.quantite_min_commande }}">
            </div>
            <div class="col-md-6">
              <label class="form-label">Unité</label>
              <input class="form-control" value="{{ produit.unite_mesure }}" disabled>
            </div>
            <div class="col-md-6">
              <label class="form-label">Ville de livraison</label>
              <input name="ville_livraison" class="form-control" placeholder="Douala, Yaoundé...">
            </div>
            <div class="col-md-6">
              <label class="form-label">Téléphone</label>
              <input name="telephone" class="form-control" placeholder="+237 6...">
            </div>
            <div class="col-12">
              <label class="form-label">Message</label>
              <textarea name="message" class="form-control" rows="4" placeholder="Délai souhaité, paiement, livraison..."></textarea>
            </div>
            <div class="col-12">
              <div class="agro-payment-strip">
                <span>MTN Mobile Money</span>
                <span>Orange Money</span>
                <span>Paiement livraison</span>
              </div>
            </div>
            <div class="col-12">
              <button class="btn btn-agro btn-lg" type="submit">Envoyer la commande</button>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
