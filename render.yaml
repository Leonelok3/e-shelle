databases:
  - name: eshelle-demo-db
    plan: free

services:
  - type: web
    name: eshelle-demo
    runtime: python
    plan: free
    buildCommand: "bash ./render_build.sh"
    startCommand: "gunicorn edu_cm.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    envVars:
      - key: PYTHON_VERSION
        value: "3.13.13"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: USE_POSTGRES
        value: "true"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com,localhost,127.0.0.1"
      - key: ESHELLE_SUBDOMAIN_CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"
      - key: SITE_URL
        value: "https://eshelle-demo.onrender.com"
      - key: RUN_RENDER_SEED
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: eshelle-demo-db
          property: connectionString
