# ==============================================================
# NGINX CONFIG — Fix upload audio + protected media
# À ajouter dans le bloc server{} de /etc/nginx/sites-available/immigration97
# ==============================================================

server {

    # -------------------------------------------------------
    # UPLOAD : augmenter la limite pour les fichiers audio/vidéo
    # -------------------------------------------------------
    client_max_body_size 50M;         # Fichiers jusqu'à 50MB
    client_body_timeout  120s;        # Timeout upload = 2 minutes
    proxy_read_timeout   120s;
    proxy_connect_timeout 120s;
    proxy_send_timeout   120s;

    # -------------------------------------------------------
    # PROTECTED MEDIA — fichiers dans protected-media/
    # Nginx sert directement (X-Accel-Redirect interne)
    # -------------------------------------------------------
    location /_protected_media/ {
        internal;
        alias /var/www/immigration97/media/protected-media/;
        add_header Cache-Control "private, max-age=86400";
        add_header Accept-Ranges bytes;
    }

    # -------------------------------------------------------
    # MEDIA — fichiers uploadés via admin (Asset, audio, etc.)
    # Nginx sert directement (X-Accel-Redirect interne)
    # -------------------------------------------------------
    location /_media/ {
        internal;
        alias /var/www/immigration97/media/;
        add_header Cache-Control "private, max-age=86400";
        add_header Accept-Ranges bytes;
    }

    # -------------------------------------------------------
    # STATIC FILES
    # -------------------------------------------------------
    location /static/ {
        alias /var/www/immigration97/staticfiles/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # -------------------------------------------------------
    # MEDIA PUBLICS (non protégés)
    # -------------------------------------------------------
    location /media/ {
        alias /var/www/immigration97/media/;
        expires 1d;
    }

    # -------------------------------------------------------
    # DJANGO / GUNICORN
    # -------------------------------------------------------
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}

# ==============================================================
# COMMANDES À EXÉCUTER SUR LE VPS APRÈS MODIFICATION :
#
#   sudo nginx -t                   # Tester la config
#   sudo systemctl reload nginx     # Appliquer sans coupure
# ==============================================================
