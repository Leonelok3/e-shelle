{% extends "base.html" %}

{% block title %}Audio Studio - E-Shelle{% endblock %}

{% block content %}
<section style="padding:7rem 1rem 4rem;background:#071012;min-height:100vh;color:#fff">
  <div style="max-width:720px;margin:0 auto;background:rgba(255,255,255,.055);border:1px solid rgba(255,255,255,.1);border-radius:18px;padding:1.2rem">
    <a href="{% url 'audio_studio:dashboard' %}" style="color:#7cf6ca;text-decoration:none;font-weight:850">Retour Audio Studio</a>
    <h1 style="font-family:var(--font-display);font-size:2.4rem;margin:.8rem 0">Audio Studio</h1>
    <form method="post" enctype="multipart/form-data" style="display:grid;gap:.8rem">
      {% csrf_token %}
      {{ form.as_p }}
      <button style="border:0;border-radius:12px;padding:.85rem 1rem;background:linear-gradient(135deg,#22c55e,#14b8a6);color:#04120f;font-weight:950" type="submit">Valider</button>
    </form>
  </div>
</section>
{% endblock %}
